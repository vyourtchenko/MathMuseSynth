<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>MathMuse | Hear the Shape of Math</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Load Phosphor Icons for UI -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Load Math.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.min.js"></script>
    <!-- Load MathLive -->
    <script defer type="module" src="https://unpkg.com/mathlive?module"></script>
    
    <link rel="stylesheet" href="styles.css">
    <script defer src="app.js"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="split-layout">
        <!-- LEFT SIDEBAR -->
        <aside class="sidebar glass-panel">
            <header>
                <div class="logo">
                    <i class="ph-fill ph-wave-sine"></i>
                    <h1>MathMuse</h1>
                </div>
                <p class="subtitle">Translate mathematical functions directly into sound.</p>
            </header>

            <section class="equation-section">
                <label for="formula">f(x) =</label>
                <div class="math-input-wrapper">
                    <math-field id="formula" default-mode="math">
                        \sin(a \cdot x) + \cos(b \cdot x)
                    </math-field>
                </div>
                <div id="equation-error" class="error-msg"></div>
            </section>

            <!-- Dynamic Variables injected here -->
            <section class="variables-section" id="variables-container" style="display: none;">
                <!-- Sliders generated via JS -->
            </section>

            <section class="controls-section">
                <div class="control-group">
                    <label style="display: flex; justify-content: space-between; align-items: center;">
                        Domain (x)
                        <button id="btn-download-wav" class="btn-icon-small" title="Download WAV representation" style="background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 0; display: flex; align-items: center;">
                            <i class="ph ph-download-simple" style="font-size: 1.2rem; transition: color 0.1s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-muted)'"></i>
                        </button>
                    </label>
                    <div class="input-row">
                        <input type="number" id="x-min" value="0.31" step="0.01" title="X Minimum">
                        <span>to</span>
                        <input type="number" id="x-max" value="0.72" step="0.01" title="X Maximum">
                    </div>
                </div>
                
                <div class="control-group">
                    <label for="duration">Duration (s)</label>
                    <input type="number" id="duration" value="0.3" min="0.01" step="0.01">
                </div>

                <div class="control-group volume-group">
                    <label for="volume">Volume</label>
                    <div class="slider-wrapper">
                        <i class="ph ph-speaker-low"></i>
                        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.2">
                        <i class="ph ph-speaker-high"></i>
                    </div>
                </div>

                <div class="control-group" style="margin-top: 1rem;">
                    <button id="btn-piano-mode" class="btn-primary" style="padding: 0.75rem; border-radius: 8px; width: 100%; font-size: 1rem;" title="Play math as a musical instrument">
                        <i class="ph-fill ph-piano-keys"></i> Piano Mode
                    </button>
                    <div id="piano-instructions" style="display: none; font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-top: 0.5rem; line-height: 1.4;">
                        <b>Piano Active!</b><br/>Press white keys <b>A S D F G H J K L ; '</b><br/>and black keys <b>W E T Y U O P</b> to play notes.
                    </div>
                </div>
            </section>
        </aside>

        <!-- RIGHT MAIN GRAPH -->
        <main class="main-graph">
            <div class="canvas-wrapper">
                <canvas id="waveform-canvas"></canvas>
                <div id="playhead" class="playhead"></div>
            </div>
            
            <div id="piano-visual-container" class="piano-visual-container">
                <div class="piano-telemetry">
                    <span id="piano-telemetry-mult">Pitch Multiplier: -- x</span>
                </div>
                <div class="piano-keyboard-ui">
                    <div class="piano-key white-key" data-key="KeyA"><span class="key-label">A</span></div>
                    <div class="piano-key white-key" data-key="KeyS"><span class="key-label">S</span></div>
                    <div class="piano-key white-key" data-key="KeyD"><span class="key-label">D</span></div>
                    <div class="piano-key white-key" data-key="KeyF"><span class="key-label">F</span></div>
                    <div class="piano-key white-key" data-key="KeyG"><span class="key-label">G</span></div>
                    <div class="piano-key white-key" data-key="KeyH"><span class="key-label">H</span></div>
                    <div class="piano-key white-key" data-key="KeyJ"><span class="key-label">J</span></div>
                    <div class="piano-key white-key" data-key="KeyK"><span class="key-label">K</span></div>
                    <div class="piano-key white-key" data-key="KeyL"><span class="key-label">L</span></div>
                    <div class="piano-key white-key" data-key="Semicolon"><span class="key-label">;</span></div>
                    <div class="piano-key white-key" data-key="Quote"><span class="key-label">'</span></div>
                    
                    <div class="piano-key black-key" style="left: calc(100% / 11 * 1);" data-key="KeyW"><span class="key-label">W</span></div>
                    <div class="piano-key black-key" style="left: calc(100% / 11 * 2);" data-key="KeyE"><span class="key-label">E</span></div>
                    <div class="piano-key black-key" style="left: calc(100% / 11 * 4);" data-key="KeyT"><span class="key-label">T</span></div>
                    <div class="piano-key black-key" style="left: calc(100% / 11 * 5);" data-key="KeyY"><span class="key-label">Y</span></div>
                    <div class="piano-key black-key" style="left: calc(100% / 11 * 6);" data-key="KeyU"><span class="key-label">U</span></div>
                    <div class="piano-key black-key" style="left: calc(100% / 11 * 8);" data-key="KeyO"><span class="key-label">O</span></div>
                    <div class="piano-key black-key" style="left: calc(100% / 11 * 9);" data-key="KeyP"><span class="key-label">P</span></div>
                </div>
            </div>
            
            <div class="playback-controls floating-controls">
                <button id="btn-play" class="btn-primary" title="Play / Pause">
                    <i class="ph-fill ph-play icon-play"></i>
                    <i class="ph-fill ph-pause icon-pause" style="display: none;"></i>
                    <span class="btn-text">Play</span>
                </button>
                <button id="btn-loop" class="btn-secondary" title="Toggle Loop">
                    <i class="ph ph-repeat"></i>
                </button>
                <button id="btn-sync-domain" class="btn-secondary" title="Sync Domain to View">
                    <i class="ph ph-scan"></i>
                </button>
                <button id="btn-draw" class="btn-secondary" title="Redraw Graph">
                    <i class="ph ph-arrows-clockwise"></i>
                </button>
                <button id="btn-reset-view" class="btn-secondary" title="Default Zoom">
                    <i class="ph ph-house"></i>
                </button>
            </div>
            <div class="zoom-controls">
                <button id="btn-zoom-y-in" class="btn-icon" title="Zoom In (Y-Axis)">
                    <i class="ph ph-plus"></i>
                </button>
                <button id="btn-zoom-y-out" class="btn-icon" title="Zoom Out (Y-Axis)">
                    <i class="ph ph-minus"></i>
                </button>
            </div>
        </main>
    </div>
</body>
</html>
